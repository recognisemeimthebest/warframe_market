<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>워프봇</title>
    <link rel="stylesheet" href="/static/style.css?v=20260419i">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4db8ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="오디스 프라임">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
    <div id="app">
        <header>
            <div style="display:flex;align-items:center;gap:10px;">
                <h1>워프봇</h1>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <span id="status" class="status offline">연결 중...</span>
                <button id="settings-btn" onclick="toggleSettings()" title="설정">&#9881;</button>
            </div>
        </header>

        <!-- 설정 패널 -->
        <div id="settings-overlay" style="display:none;" onclick="toggleSettings()"></div>
        <div id="settings-panel" style="display:none;">
            <div class="settings-header">
                <span class="settings-title">설정</span>
                <button class="settings-close" onclick="toggleSettings()">&times;</button>
            </div>
            <div class="settings-body">
                <div class="settings-section">
                    <div class="settings-section-title">알림</div>
                    <div class="settings-row">
                        <span>방해 금지 모드</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="set-dnd" onchange="saveSettings()">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="settings-hint">활성화하면 모든 알림이 일시 중단됩니다.</div>
                    <div class="settings-row">
                        <span>알림 방식</span>
                        <select id="set-notify-style" onchange="saveSettings()">
                            <option value="popup">상단 팝업</option>
                            <option value="badge">뱃지만 표시</option>
                            <option value="sound">소리 + 팝업</option>
                        </select>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">테마</div>
                    <div class="settings-row">
                        <span>모드</span>
                        <div class="mode-toggle">
                            <button class="mode-btn active" data-mode="dark" onclick="switchMode('dark')">다크</button>
                            <button class="mode-btn" data-mode="light" onclick="switchMode('light')">라이트</button>
                        </div>
                    </div>
                    <div class="settings-sub-label" id="palette-label">다크 팔레트</div>
                    <div class="palette-grid" id="palette-grid"></div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">급등 감지 기준</div>
                    <div class="settings-hint">급등으로 판단하는 최소 변동률을 설정합니다.</div>
                    <div class="settings-row">
                        <span>1일 기준 (%)</span>
                        <input type="number" id="surge-thr-1d" class="surge-thr-input" min="5" max="200" value="20">
                    </div>
                    <div class="settings-row">
                        <span>7일 기준 (%)</span>
                        <input type="number" id="surge-thr-7d" class="surge-thr-input" min="5" max="200" value="30">
                    </div>
                    <div class="settings-row">
                        <span>30일 기준 (%)</span>
                        <input type="number" id="surge-thr-30d" class="surge-thr-input" min="5" max="200" value="50">
                    </div>
                    <div class="settings-row">
                        <span>최소 가격 (p)</span>
                        <input type="number" id="surge-thr-minprice" class="surge-thr-input" min="1" max="1000" value="5">
                    </div>
                    <button class="surge-thr-save-btn" onclick="saveSurgeThresholds()">저장</button>
                    <div id="surge-thr-msg" class="settings-hint" style="color:var(--accent);"></div>
                </div>
                <div class="settings-section" id="install-section" style="display:none;">
                    <div class="settings-section-title">앱 설치</div>
                    <div class="settings-hint">홈 화면에 추가하면 앱처럼 사용할 수 있습니다.</div>
                    <button id="install-btn" class="install-btn" onclick="installPwa()">홈 화면에 추가</button>
                </div>
            </div>
        </div>

        <nav id="tabs">
            <button class="tab active" data-tab="chat">시세 조회</button>
            <button class="tab" data-tab="world">월드</button>
            <button class="tab" data-tab="farming">파밍</button>
            <button class="tab" data-tab="modding">모딩 공유</button>
            <button class="tab" data-tab="board">거래소</button>
        </nav>

        <!-- 시세 조회 탭 -->
        <main id="tab-chat" class="tab-content active">
            <div id="chat-mode-bar">
                <button class="chat-mode active" data-mode="chat">검색</button>
                <button class="chat-mode" data-mode="surges">급등알림</button>
                <button class="chat-mode" data-mode="report">주간리포트</button>
                <button class="chat-mode" data-mode="watchlist">시세 감시</button>
                <button class="chat-mode" data-mode="auction">경매</button>
                <button class="chat-mode" data-mode="skins">스킨</button>
                <button class="chat-mode" data-mode="arbitrage">차익</button>
            </div>
            <div id="messages">
                <div class="message bot">
                    <div class="bubble">
                        안녕! 워프레임 시세 봇이야.<br>
                        아이템 이름을 입력하면 시세를 알려줄게!<br>
                        <small>예: "라이노 프라임 세트" 또는 "rhino prime set"</small>
                    </div>
                </div>
            </div>
            <div id="chat-watchlist" style="display:none;"></div>
            <div id="chat-auction" style="display:none;"></div>
            <div id="chat-arbitrage" style="display:none;"></div>
            <div id="chat-skins" style="display:none;">
                <div id="skin-type-bar">
                    <button class="skin-type-btn active" data-stype="warframe">워프레임</button>
                    <button class="skin-type-btn" data-stype="primary">주무기</button>
                    <button class="skin-type-btn" data-stype="secondary">보조무기</button>
                    <button class="skin-type-btn" data-stype="melee">근접무기</button>
                </div>
                <div id="skin-search-row">
                    <input type="text" id="skin-input" placeholder="이름 검색... (예: 라이노, Excalibur)" autocomplete="off">
                    <button onclick="fetchSkins()">검색</button>
                </div>
                <div id="skin-results"></div>
            </div>
            <!-- 급등 알림 (시세 조회 서브탭) -->
            <div id="chat-surges" style="display:none;">
                <div id="surge-filters">
                    <button class="surge-filter active" data-period="">전체</button>
                    <button class="surge-filter" data-period="1d">1일</button>
                    <button class="surge-filter" data-period="7d">1주</button>
                    <button class="surge-filter" data-period="30d">1달</button>
                </div>
                <div id="surge-list"></div>
            </div>
            <!-- 주간 리포트 (시세 조회 서브탭) -->
            <div id="chat-report" style="display:none;">
                <div id="report-header">
                    <button class="report-refresh-btn" onclick="loadWeeklyReport()">새로고침</button>
                </div>
                <div id="report-content"><p class="report-loading">로딩 중...</p></div>
            </div>
        </main>

        <!-- 월드 상태 탭 -->
        <main id="tab-world" class="tab-content">
            <div id="world-filters">
                <button class="world-filter active" data-section="fissures">균열</button>
                <button class="world-filter" data-section="arbitration">중재</button>
                <button class="world-filter" data-section="invasions">침공</button>
                <button class="world-filter" data-section="cycles">오픈월드</button>
                <button class="world-filter" data-section="vendors">상인</button>
                <button class="world-filter" data-section="incarnon">인카논</button>
                <button class="world-filter" data-section="alerts">알림 설정</button>
            </div>
            <div id="world-list"></div>
            <div class="alert-notify" id="alert-notify"></div>
        </main>

        <!-- 파밍 정보 탭 -->
        <main id="tab-farming" class="tab-content">
            <div id="farming-sub-bar">
                <button class="farming-sub active" data-fsub="farming">파밍</button>
                <button class="farming-sub" data-fsub="relic">렐릭</button>
            </div>
            <div id="farming-sub-farming">
                <div id="farming-results"></div>
            </div>
            <div id="farming-sub-relic" style="display:none;">
                <div id="relic-search-area">
                    <div id="relic-input-row">
                        <div style="flex:1;position:relative;">
                            <input type="text" id="relic-input" placeholder="렐릭 이름 검색... (예: Axi A6)" autocomplete="off" oninput="onRelicInput()">
                            <div id="relic-suggest" style="display:none;"></div>
                        </div>
                        <select id="relic-refine">
                            <option value="Intact">Intact</option>
                            <option value="Exceptional">Exceptional</option>
                            <option value="Flawless">Flawless</option>
                            <option value="Radiant" selected>Radiant</option>
                        </select>
                        <button onclick="loadRelicValue()">조회</button>
                    </div>
                </div>
                <div id="relic-results"></div>
            </div>
        </main>

        <!-- 모딩 공유 탭 -->
        <main id="tab-modding" class="tab-content">
            <div id="modding-sub-bar">
                <button class="modding-sub active" data-msub="share">채팅방 공유</button>
                <button class="modding-sub" data-msub="ref">참고 빌드</button>
                <button class="modding-sub" data-msub="calc">가상 모딩</button>
            </div>
            <div id="modding-sub-share">
                <div id="modding-content"></div>
            </div>
            <div id="modding-sub-ref" style="display:none;">
                <div id="ref-build-search-area">
                    <div id="ref-build-input-row">
                        <input type="text" id="ref-build-input" placeholder="워프레임 또는 무기 이름 검색... (예: 라이노 프라임)" autocomplete="off">
                        <button onclick="searchRefBuilds()">검색</button>
                    </div>
                </div>
                <div id="ref-build-results"></div>
            </div>
            <div id="modding-sub-calc" style="display:none;">
                <div id="calc-container"></div>
            </div>
        </main>

        <!-- 거래소 탭 -->
        <main id="tab-board" class="tab-content">
            <div id="board-subtab-bar">
                <button class="board-subtab active" data-btype="WTS">팝니다</button>
                <button class="board-subtab" data-btype="WTB">삽니다</button>
                <button class="board-subtab" data-btype="RIVEN">리벤</button>
            </div>
            <div id="board-action-bar">
                <button class="board-write-btn" onclick="openBoardWriteModal()">+ 글쓰기</button>
                <button class="board-my-btn" onclick="openBoardMyModal()">내 게시글</button>
            </div>
            <div id="board-list"></div>
        </main>

        <!-- 거래소 글쓰기 모달 -->
        <div id="board-modal-overlay" style="display:none;" onclick="closeBoardModal()"></div>
        <div id="board-modal" style="display:none;">
            <div class="board-modal-header">
                <span id="board-modal-title">거래소 글쓰기</span>
                <button class="board-modal-close" onclick="closeBoardModal()">&times;</button>
            </div>
            <div class="board-modal-body" id="board-modal-body"></div>
        </div>

        <footer id="farming-footer" style="display:none;">
            <form id="farming-form" onsubmit="return false;">
                <input type="text" id="farming-input" placeholder="아이템/모드/워프레임 이름 검색..." autocomplete="off">
                <button type="submit">검색</button>
            </form>
        </footer>

        <footer id="chat-footer">
            <form id="chat-form" onsubmit="return false;">
                <input type="text" id="chat-input" placeholder="아이템 이름을 입력하세요..." autocomplete="off">
                <button type="submit">전송</button>
            </form>
        </footer>

    </div>

    <script src="/static/app.js?v=20260419i"></script>
    <script src="/static/board.js?v=20260419i"></script>
    <script src="/static/calc.js?v=20260419i"></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/static/sw.js").catch(() => {});
        }
    </script>
</body>
</html>
