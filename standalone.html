<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>워프봇</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg: #1a1a2e; --surface: #16213e; --primary: #4db8ff;
    --text: #e0e0e0; --text-muted: #888; --user-bubble: #0f3460;
    --price-bg: #0a1628; --green: #4caf50; --red: #ff6b6b; --border: #2a2a4a;
    --orange: #ff9800;
}
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
#app { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; }
header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
header h1 { font-size: 18px; color: var(--primary); }
.status { font-size: 12px; padding: 4px 8px; border-radius: 12px; }
.status.online { background: rgba(76,175,80,0.2); color: var(--green); }
.status.offline { background: rgba(255,107,107,0.2); color: var(--red); }

#tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 10px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-content { display: none; }
.tab-content.active { display: flex; flex-direction: column; }

main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
#messages { flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column; gap: 12px; }
.message { display: flex; max-width: 85%; }
.message.user { align-self: flex-end; }
.message.bot { align-self: flex-start; }
.bubble { padding: 10px 14px; border-radius: 16px; line-height: 1.5; font-size: 14px; word-break: break-word; }
.message.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
.message.bot .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.bubble small { color: var(--text-muted); font-size: 12px; }

.price-card { background: var(--price-bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; min-width: 260px; }
.price-card .title { font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 10px; }
.price-card .title a { color: var(--primary); text-decoration: none; }
.price-card .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.price-card .label { color: var(--text-muted); }
.price-card .value { font-weight: 600; }
.price-card .footer { margin-top: 8px; font-size: 11px; color: var(--text-muted); text-align: right; }
.price-card .rank-divider { border-top: 1px solid var(--border); margin: 8px 0 6px; }
.price-card .rank-label { font-size: 12px; font-weight: 600; color: var(--primary); margin: 6px 0 2px; }

.suggest-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; min-width: 260px; }
.suggest-card .suggest-title { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
.suggest-card .suggest-item { display: block; padding: 8px 12px; margin: 4px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--primary); font-size: 13px; cursor: pointer; text-decoration: none; }
.suggest-card .suggest-item:hover { border-color: var(--primary); background: rgba(77,184,255,0.1); }
.suggest-card .suggest-sub { color: var(--text-muted); font-size: 11px; }

footer { padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); }
#chat-form { display: flex; gap: 8px; }
#chat-input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
#chat-input:focus { border-color: var(--primary); }
#chat-form button { padding: 10px 18px; background: var(--primary); color: #000; border: none; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
#chat-form button:active { opacity: 0.8; }

/* 급등 */
#surge-filters { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.surge-filter { padding: 6px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; color: var(--text-muted); font-size: 12px; cursor: pointer; }
.surge-filter.active { background: rgba(77,184,255,0.15); border-color: var(--primary); color: var(--primary); }
#surge-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.surge-empty { text-align: center; color: var(--text-muted); padding: 40px 16px; font-size: 14px; }
.surge-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
.surge-card:hover { border-color: var(--primary); }
.surge-info { flex: 1; }
.surge-name { font-size: 14px; font-weight: 600; color: var(--text); }
.surge-name-sub { font-size: 11px; color: var(--text-muted); margin-left: 6px; }
.surge-detail { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.surge-pct { font-size: 16px; font-weight: 700; color: var(--green); white-space: nowrap; margin-left: 12px; }
.surge-period { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 6px; }
.surge-period.p-1d { background: rgba(76,175,80,0.2); color: var(--green); }
.surge-period.p-7d { background: rgba(77,184,255,0.2); color: var(--primary); }
.surge-period.p-30d { background: rgba(255,152,0,0.2); color: var(--orange); }

/* 거래소 */
#trade-filters { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.trade-filter { padding: 6px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; color: var(--text-muted); font-size: 12px; cursor: pointer; }
.trade-filter.active { background: rgba(77,184,255,0.15); border-color: var(--primary); color: var(--primary); }
#trade-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.trade-card { padding: 12px 14px; margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.trade-card:hover { border-color: var(--primary); }
.trade-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.trade-type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.trade-type.buy { background: rgba(76,175,80,0.2); color: var(--green); }
.trade-type.sell { background: rgba(255,107,107,0.2); color: var(--red); }
.trade-user { font-size: 12px; color: var(--text-muted); }
.trade-item { font-size: 14px; font-weight: 600; color: var(--text); }
.trade-price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
.trade-price { font-size: 16px; font-weight: 700; color: var(--primary); }
.trade-memo { font-size: 12px; color: var(--text-muted); margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border); }
.trade-delete { background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
.trade-delete:hover { border-color: var(--red); color: var(--red); }
.trade-qty { font-size: 12px; color: var(--text-muted); }

/* 거래소 등록 */
#trade-register { padding: 16px; text-align: center; }
#trade-register p { color: var(--text-muted); font-size: 14px; margin-bottom: 12px; }
#trade-register input { padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; width: 200px; }
#trade-register input:focus { border-color: var(--primary); }
#trade-register button { margin-top: 8px; padding: 8px 20px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.trade-status-msg { padding: 40px 16px; text-align: center; color: var(--text-muted); font-size: 14px; }

#trade-form-area { padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); }
#trade-new-btn { width: 100%; padding: 10px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
#trade-new-form { display: none; }
#trade-new-form .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
#trade-new-form .form-row label { font-size: 12px; color: var(--text-muted); min-width: 50px; }
#trade-new-form .form-row input, #trade-new-form .form-row select {
    flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 13px; outline: none;
}
.market-ref-hint { font-size: 11px; color: var(--orange); padding: 4px 0 8px; }
#trade-new-form .form-actions { display: flex; gap: 8px; }
#trade-new-form .form-actions button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-submit { background: var(--primary); color: #000; }
.btn-cancel { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border) !important; }

/* 시세 감시 */
#chat-mode-bar { display: flex; gap: 8px; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.chat-mode { padding: 5px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; color: var(--text-muted); font-size: 12px; cursor: pointer; }
.chat-mode.active { background: rgba(77,184,255,0.15); border-color: var(--primary); color: var(--primary); }
.chat-mode[data-mode="watchlist"].active { background: rgba(255,152,0,0.15); border-color: var(--orange); color: var(--orange); }
.chat-mode[data-mode="auction"].active { background: rgba(156,39,176,0.15); border-color: #ce93d8; color: #ce93d8; }
#chat-watchlist { flex: 1; overflow-y: auto; padding: 12px 16px; }
.watchlist-card { padding: 12px 14px; margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
.watchlist-card:hover { border-color: var(--orange); }
.watchlist-info { flex: 1; }
.watchlist-item { font-size: 14px; font-weight: 600; color: var(--text); }
.watchlist-price-row { display: flex; gap: 12px; align-items: center; margin-top: 4px; }
.watchlist-target { font-size: 13px; color: var(--orange); font-weight: 700; }
.watchlist-market { font-size: 11px; color: var(--text-muted); }
.watchlist-status { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.watchlist-status.waiting { background: rgba(255,152,0,0.15); color: var(--orange); }
.watchlist-status.hit { background: rgba(76,175,80,0.2); color: var(--green); }
.watchlist-actions { display: flex; align-items: center; gap: 6px; margin-left: 10px; }
.watchlist-delete { background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
.watchlist-delete:hover { border-color: var(--red); color: var(--red); }
.watchlist-add-form { padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
.watchlist-add-form .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.watchlist-add-form .form-row label { font-size: 12px; color: var(--text-muted); min-width: 50px; }
.watchlist-add-form .form-row input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
.watchlist-add-form .form-row input:focus { border-color: var(--orange); }
.watchlist-empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px 16px; }
.watchlist-hint { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }

/* 월드 상태 */
#world-filters { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.world-filter { padding: 6px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; color: var(--text-muted); font-size: 12px; cursor: pointer; }
.world-filter.active { background: rgba(77,184,255,0.15); border-color: var(--primary); color: var(--primary); }
#world-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.world-card { padding: 12px 14px; margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.world-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.world-card-title { font-size: 14px; font-weight: 600; color: var(--text); }
.world-card-timer { font-size: 13px; font-weight: 600; color: var(--orange); }
.world-card-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.world-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 6px; }
.world-tag.lith { background: rgba(76,175,80,0.2); color: var(--green); }
.world-tag.meso { background: rgba(77,184,255,0.2); color: var(--primary); }
.world-tag.neo { background: rgba(255,152,0,0.2); color: var(--orange); }
.world-tag.axi { background: rgba(255,107,107,0.2); color: var(--red); }
.world-tag.requiem { background: rgba(156,39,176,0.2); color: #ce93d8; }
.world-tag.omnia { background: rgba(255,215,0,0.2); color: #ffd700; }
.world-tag.enemy { background: rgba(255,255,255,0.08); color: var(--text-muted); }
.world-tag.hard { background: rgba(255,107,107,0.15); color: var(--red); }

.cycle-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.cycle-name { font-size: 13px; font-weight: 600; color: var(--text); min-width: 70px; }
.cycle-state { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.cycle-state.day { background: rgba(255,215,0,0.2); color: #ffd700; }
.cycle-state.night { background: rgba(77,100,180,0.2); color: #7986cb; }
.cycle-state.warm { background: rgba(255,107,107,0.2); color: var(--red); }
.cycle-state.cold { background: rgba(77,184,255,0.2); color: var(--primary); }
.cycle-timer { font-size: 12px; color: var(--orange); margin-left: auto; }

.invasion-bar { height: 6px; border-radius: 3px; background: var(--border); margin-top: 6px; overflow: hidden; }
.invasion-bar-fill { height: 100%; border-radius: 3px; }
.invasion-bar-fill.corpus { background: var(--primary); }
.invasion-bar-fill.grineer { background: var(--red); }
.invasion-bar-fill.infested { background: var(--green); }
.invasion-rewards { display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; }
.invasion-rewards .atk { color: var(--primary); }
.invasion-rewards .def { color: var(--red); }

/* 설정 */
#settings-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 2px; line-height: 1; }
#settings-btn:hover { color: var(--primary); }
#settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
#settings-panel { position: fixed; top: 0; right: 0; width: 320px; max-width: 85vw; height: 100%; background: var(--bg); border-left: 1px solid var(--border); z-index: 201; overflow-y: auto; display: flex; flex-direction: column; animation: slideRight 0.2s; }
@keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
.settings-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.settings-title { font-size: 16px; font-weight: 700; color: var(--text); }
.settings-close { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; }
.settings-body { padding: 16px; flex: 1; overflow-y: auto; }
.settings-section { margin-bottom: 20px; }
.settings-section-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.settings-row span { font-size: 13px; color: var(--text); }
.settings-row select { padding: 5px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; outline: none; }
.settings-hint { font-size: 11px; color: var(--text-muted); padding: 4px 0 6px; }
.settings-sub-label { font-size: 12px; color: var(--text-muted); margin: 10px 0 8px; }
.toggle-switch { position: relative; width: 44px; height: 24px; display: inline-block; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: 0.2s; }
.toggle-slider::before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: var(--text-muted); border-radius: 50%; transition: 0.2s; }
.toggle-switch input:checked + .toggle-slider { background: var(--primary); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); background: #fff; }
.mode-toggle { display: flex; gap: 4px; }
.mode-btn { padding: 5px 14px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
.mode-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
.palette-grid { display: flex; flex-direction: column; gap: 8px; }
.palette-option { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--surface); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.15s; }
.palette-option:hover { border-color: var(--text-muted); }
.palette-option.active { border-color: var(--primary); }
.palette-colors { display: flex; gap: 4px; }
.palette-swatch { width: 24px; height: 24px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
.palette-name { font-size: 12px; color: var(--text); font-weight: 600; }

/* 경매 */
#chat-auction { flex: 1; overflow-y: auto; padding: 12px 16px; }
.auction-search { display: flex; gap: 8px; margin-bottom: 10px; }
.auction-search input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
.auction-search input:focus { border-color: #ce93d8; }
.auction-search button { padding: 10px 16px; background: #ce93d8; color: #000; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.auction-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.auction-tab { padding: 5px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; color: var(--text-muted); font-size: 12px; cursor: pointer; }
.auction-tab.active { background: rgba(156,39,176,0.15); border-color: #ce93d8; color: #ce93d8; }
.auction-card { padding: 12px 14px; margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.auction-card:hover { border-color: #ce93d8; }
.auction-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.auction-card-title { font-size: 14px; font-weight: 600; color: var(--text); }
.auction-card-title a { color: #ce93d8; text-decoration: none; }
.auction-card-price { font-size: 16px; font-weight: 700; color: #ce93d8; }
.auction-card-price .buyout { font-size: 11px; color: var(--text-muted); font-weight: 400; }
.auction-stats { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.auction-stat { display: inline-block; padding: 2px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; color: var(--text-muted); }
.auction-stat.positive { color: var(--green); border-color: rgba(76,175,80,0.3); }
.auction-stat.negative { color: var(--red); border-color: rgba(255,107,107,0.3); }
.auction-seller { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
.auction-seller .online { color: var(--green); }
.auction-empty { text-align: center; padding: 30px 16px; color: var(--text-muted); font-size: 13px; }
.auction-ephemera-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(156,39,176,0.15); color: #ce93d8; font-weight: 600; }

/* 파밍 */
#farming-results { flex: 1; overflow-y: auto; padding: 12px 16px; }
#farming-footer form { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); }
#farming-footer input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
#farming-footer input:focus { border-color: var(--primary); }
#farming-footer button { padding: 10px 18px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.farming-welcome { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; line-height: 1.8; }
.farming-card { padding: 14px; margin-bottom: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.farming-card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.farming-card-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
.farming-card-type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-right: 6px; }
.farming-card-type.prime { background: rgba(255,152,0,0.2); color: var(--orange); }
.farming-card-type.mod { background: rgba(77,184,255,0.2); color: var(--primary); }
.farming-card-type.frame { background: rgba(156,39,176,0.2); color: #ce93d8; }
.farming-card-type.weapon { background: rgba(76,175,80,0.2); color: var(--green); }
.farming-drop { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.farming-drop:last-child { border-bottom: none; }
.farming-drop-source { color: var(--text); flex: 1; }
.farming-drop-rate { color: var(--orange); font-weight: 600; font-size: 12px; min-width: 55px; text-align: right; }
.farming-relic-rarity { font-size: 11px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
.farming-relic-rarity.common { background: rgba(76,175,80,0.2); color: var(--green); }
.farming-relic-rarity.uncommon { background: rgba(77,184,255,0.2); color: var(--primary); }
.farming-relic-rarity.rare { background: rgba(255,152,0,0.2); color: var(--orange); }
.farming-candidates { margin-bottom: 8px; }

/* 모딩 공유 */
#modding-content { flex: 1; overflow-y: auto; padding: 12px 16px; }
.modding-cats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.modding-cat-btn { padding: 6px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; color: var(--text-muted); font-size: 12px; cursor: pointer; }
.modding-cat-btn.active { background: rgba(156,39,176,0.15); border-color: #ce93d8; color: #ce93d8; }
.modding-card { padding: 12px; margin-bottom: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.modding-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.modding-card-author { font-size: 13px; font-weight: 600; color: var(--primary); }
.modding-card-date { font-size: 11px; color: var(--text-muted); }
.modding-card-memo { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 8px; white-space: pre-wrap; word-break: break-word; }
.modding-images { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
.modding-images img { height: 120px; border-radius: 6px; border: 1px solid var(--border); object-fit: cover; cursor: pointer; }
.modding-images img:hover { border-color: var(--primary); }
.modding-item-card { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
.modding-item-card:hover { border-color: var(--primary); }
.modding-item-thumb-empty { width: 56px; height: 56px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); flex-shrink: 0; }
.modding-item-info { flex: 1; min-width: 0; }
.modding-item-info .modding-item-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.modding-item-meta { font-size: 11px; color: var(--text-muted); }
.modding-item-arrow { font-size: 20px; color: var(--text-muted); flex-shrink: 0; }
.modding-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.modding-back-btn { padding: 4px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-size: 12px; cursor: pointer; }
.modding-back-btn:hover { border-color: var(--primary); color: var(--primary); }
.modding-detail-title { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }
.modding-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
.modding-add-btn { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 8px 16px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.modding-form { padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; }
.modding-form .form-row { margin-bottom: 10px; }
.modding-form .form-row label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.modding-form .form-row input, .modding-form .form-row textarea, .modding-form .form-row select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; box-sizing: border-box; }
.modding-form textarea { resize: vertical; min-height: 80px; font-family: inherit; }
.modding-form-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modding-form-actions button { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
.modding-upload-area { border: 1px dashed var(--border); border-radius: 8px; padding: 12px; text-align: center; color: var(--text-muted); font-size: 12px; cursor: pointer; }
.modding-upload-area:hover { border-color: var(--primary); color: var(--primary); }
.modding-upload-preview { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.modding-upload-preview .thumb { position: relative; display: inline-block; }
.modding-upload-preview .thumb img { height: 64px; border-radius: 4px; border: 1px solid var(--border); object-fit: cover; }
.modding-upload-preview .thumb-remove { position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; background: #ef5350; color: #fff; border: none; border-radius: 50%; font-size: 10px; line-height: 16px; text-align: center; cursor: pointer; padding: 0; }
.modding-lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer; }
.modding-lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
.modding-card-delete { background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; padding: 2px 8px; font-size: 11px; cursor: pointer; margin-left: auto; }
.modding-card-delete:hover { border-color: var(--red); color: var(--red); }

.alert-notify { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); max-width: 560px; width: calc(100% - 32px); padding: 12px 16px; background: rgba(77,184,255,0.15); border: 1px solid var(--primary); border-radius: 10px; color: var(--primary); font-size: 13px; font-weight: 600; z-index: 100; display: none; animation: slideDown 0.3s; }
@keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

main::-webkit-scrollbar, #messages::-webkit-scrollbar, #surge-list::-webkit-scrollbar, #trade-list::-webkit-scrollbar, #world-list::-webkit-scrollbar, #chat-watchlist::-webkit-scrollbar, #chat-auction::-webkit-scrollbar, #farming-results::-webkit-scrollbar, #modding-content::-webkit-scrollbar { width: 4px; }
main::-webkit-scrollbar-thumb, #messages::-webkit-scrollbar-thumb, #surge-list::-webkit-scrollbar-thumb, #trade-list::-webkit-scrollbar-thumb, #world-list::-webkit-scrollbar-thumb, #chat-watchlist::-webkit-scrollbar-thumb, #chat-auction::-webkit-scrollbar-thumb, #farming-results::-webkit-scrollbar-thumb, #modding-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div style="display:flex;align-items:center;gap:10px;">
                <h1>워프봇</h1>
            </div>

        <!-- 설정 패널 -->

        <div id="settings-panel" style="display:none;">
            <div class="settings-header">
                <span class="settings-title">설정</span>
                <button class="settings-close" onclick="toggleSettings()">&times;</button>
            </div>
            <div class="settings-body">
                <div class="settings-section">

                            <span class="toggle-slider"></span>

                </div>
                <div class="settings-section">
                    <div class="settings-section-title">테마</div>
                    <div class="settings-row">
                        <span>모드</span>
                        <div class="mode-toggle">
                            <button class="mode-btn active" data-mode="dark" onclick="switchMode('dark')">다크</button>
                            <button class="mode-btn" data-mode="light" onclick="switchMode('light')">라이트</button>
                        </div>

                    <div class="settings-sub-label" id="palette-label">다크 팔레트</div>

        <nav id="tabs">

            <button class="tab" data-tab="surges">급등 알림</button>
            <button class="tab" data-tab="trade">거래소</button>
            <button class="tab" data-tab="world">월드</button>
            <button class="tab" data-tab="farming">파밍</button>
            <button class="tab" data-tab="modding">모딩 공유</button>

        <!-- 시세 조회 -->

            <div id="chat-mode-bar">

                <div class="message bot">
                    <div class="bubble">
                        안녕! 워프레임 시세 봇이야.<br>
                        아이템 이름을 입력하면 시세를 알려줄게!<br>
                        <small>예: "rhino prime set" 또는 "nikana prime blade"</small>

            <div id="chat-auction" style="display:none;"></div>

        <!-- 급등 알림 -->
        <main id="tab-surges" class="tab-content">
            <div id="surge-list"></div>
        </main>

        <!-- 거래소 -->
        <main id="tab-trade" class="tab-content">
            <div id="trade-register" style="display:none;">
                <p>거래소를 이용하려면 닉네임 등록이 필요합니다.</p>
                <input type="text" id="trade-name-input" placeholder="닉네임 입력" maxlength="20">
                <br><button onclick="tradeRegister()">등록</button>
            </div>
            <div id="trade-approved" style="display:none;">
                <div id="trade-filters">
                    <button class="trade-filter active" data-type="">전체</button>
                    <button class="trade-filter" data-type="buy">삽니다</button>

        <!-- 월드 상태 -->

            <form id="chat-form" onsubmit="return false;">
                <input type="text" id="chat-input" placeholder="아이템 이름을 입력하세요 (영문)..." autocomplete="off">

                        <label>유형</label>
                        <select id="tf-type"><option value="buy">삽니다</option><option value="sell">팝니다</option></select>
                    </div>

                        <label>가격</label>
                        <input type="number" id="tf-price" placeholder="플래티넘" min="1">

                        <label>수량</label>
                        <input type="number" id="tf-qty" value="1" min="1" max="999" style="width:60px;flex:none;">
                    </div>

                        <label>메모</label>

                    </div>

                        <button class="btn-cancel" onclick="toggleTradeForm()">취소</button>
                        <button class="btn-submit" onclick="submitListing()">등록</button>

<script>
/* ── 워프봇 standalone — 외부 API 직접 연동 + localStorage ── */

const WM_API = "https://api.warframe.market/v1";
const WS_API = "https://api.warframestat.us/pc";
const DROPS_API = "https://drops.warframestat.us/data/all.slim.json";

const messagesEl = document.getElementById("messages");
const form = document.getElementById("chat-form");
const input = document.getElementById("chat-input");

// ── warframe.market 아이템 목록 캐시 ──
let wmItemsCache = null;

async function loadWmItems() {
    if (wmItemsCache) return wmItemsCache;
    try {
        const res = await fetch(`${WM_API}/items`);
        const json = await res.json();
        wmItemsCache = json.payload.items;
        return wmItemsCache;
    } catch {
        return [];
    }
}

function escapeHtml(str) {
    const el = document.createElement("span");
    el.textContent = str;
    return el.innerHTML;
}

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = `message ${sender}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function formatPrice(min, count) {
    return min != null ? `${min}p (${count}건)` : "등록 없음";
}


// ── 시세 조회 (warframe.market 직접) ──
async function queryPrice(text) {
    addMessage("검색 중...", "bot");

    const items = await loadWmItems();
    const q = text.toLowerCase().trim();

    // 정확 매칭
    let match = items.find(i => i.url_name === q.replace(/ /g, "_"));
    if (!match) {
        // 이름 매칭
        match = items.find(i => i.item_name.toLowerCase() === q);
    }
    if (!match) {
        // 부분 매칭 후보
        const candidates = items.filter(i =>
            i.item_name.toLowerCase().includes(q) || i.url_name.includes(q.replace(/ /g, "_"))
        ).slice(0, 8);

        // 마지막 "검색 중..." 제거
        messagesEl.lastChild.remove();

        if (candidates.length === 0) {
            addMessage(`"${text}"에 대한 아이템을 찾지 못했어요.`, "bot");
            return;
        }
        if (candidates.length === 1) {
            match = candidates[0];
        } else {
            // 후보 목록 표시
            const div = document.createElement("div");
            div.className = "message bot";
            const card = document.createElement("div");
            card.className = "suggest-card";
            const title = document.createElement("div");
            title.className = "suggest-title";
            title.textContent = "이 아이템을 찾으셨나요?";
            card.appendChild(title);
            candidates.forEach(c => {
                const a = document.createElement("a");
                a.className = "suggest-item";
                a.textContent = c.item_name;
                a.addEventListener("click", () => {
                    addMessage(c.item_name, "user");
                    queryPrice(c.url_name);
                });
                card.appendChild(a);
            });
            div.appendChild(card);
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return;
        }
    }

    // "검색 중..." 제거
    if (messagesEl.lastChild) {
        const last = messagesEl.lastChild;
        if (last.textContent.includes("검색 중")) last.remove();
    }

    // 주문 조회
    try {
        const res = await fetch(`${WM_API}/items/${match.url_name}/orders?include=item`);
        const json = await res.json();
        const orders = json.payload.orders.filter(o => o.user.status !== "offline" && o.platform === "pc");

        const sells = orders.filter(o => o.order_type === "sell").sort((a, b) => a.platinum - b.platinum);
        const buys = orders.filter(o => o.order_type === "buy").sort((a, b) => b.platinum - a.platinum);

        const sellMin = sells.length ? sells[0].platinum : null;
        const buyMax = buys.length ? buys[0].platinum : null;

        // 48h 통계
        let avg48h = null, vol48h = 0;
        try {
            const statRes = await fetch(`${WM_API}/items/${match.url_name}/statistics`);
            const statJson = await statRes.json();
            const closed = statJson.payload.statistics_closed?.["48hours"] || [];
            if (closed.length > 0) {
                const last = closed[closed.length - 1];
                avg48h = last.avg_price;
                vol48h = last.volume;
            }
        } catch {}

        const avg48hText = avg48h != null ? `${avg48h.toFixed(1)}p (거래 ${vol48h}건)` : "-";

        // 랭크별 가격 체크
        const hasRank = sells.some(o => o.mod_rank != null && o.mod_rank > 0);
        let rankHtml = "";
        if (hasRank) {
            const maxRank = Math.max(...sells.filter(o => o.mod_rank != null).map(o => o.mod_rank));
            const rank0Sells = sells.filter(o => o.mod_rank === 0);
            const rankMaxSells = sells.filter(o => o.mod_rank === maxRank);
            const rank0Buys = buys.filter(o => o.mod_rank === 0);
            const rankMaxBuys = buys.filter(o => o.mod_rank === maxRank);

            rankHtml = `<div class="rank-divider"></div>`;
            if (rank0Sells.length || rank0Buys.length) {
                rankHtml += `
                    <div class="rank-label">랭크 0</div>
                    <div class="row"><span class="label">판매 최저가</span><span class="value">${formatPrice(rank0Sells[0]?.platinum, rank0Sells.length)}</span></div>
                    <div class="row"><span class="label">구매 최고가</span><span class="value">${formatPrice(rank0Buys[0]?.platinum, rank0Buys.length)}</span></div>
                `;
            }
            if (rankMaxSells.length || rankMaxBuys.length) {
                rankHtml += `
                    <div class="rank-label">랭크 MAX (${maxRank})</div>
                    <div class="row"><span class="label">판매 최저가</span><span class="value">${formatPrice(rankMaxSells[0]?.platinum, rankMaxSells.length)}</span></div>
                    <div class="row"><span class="label">구매 최고가</span><span class="value">${formatPrice(rankMaxBuys[0]?.platinum, rankMaxBuys.length)}</span></div>
                `;
            }
        }

        const div = document.createElement("div");
        div.className = "message bot";
        const card = document.createElement("div");
        card.className = "price-card";
        card.innerHTML = `
            <div class="title"><a href="https://warframe.market/items/${match.url_name}" target="_blank">${escapeHtml(match.item_name)}</a></div>
            <div class="row"><span class="label">판매 최저가</span><span class="value">${formatPrice(sellMin, sells.length)}</span></div>
            <div class="row"><span class="label">구매 최고가</span><span class="value">${formatPrice(buyMax, buys.length)}</span></div>
            <div class="row"><span class="label">48시간 평균</span><span class="value">${avg48hText}</span></div>
            ${rankHtml}
            <div class="footer">warframe.market · 온라인/인게임 유저 기준</div>
        `;
        div.appendChild(card);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;

    } catch (e) {
        addMessage("시세 조회 중 오류가 발생했습니다: " + e.message, "bot");
    }
}

form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, "user");
    input.value = "";
    queryPrice(text);
});


// ── 탭 전환 ──
const tabBtns = document.querySelectorAll(".tab");
const chatFooter = document.getElementById("chat-footer");
const tradeFooter = document.getElementById("trade-footer");
const farmingFooter = document.getElementById("farming-footer");
let activeTab = "chat";

tabBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        if (tab === activeTab) return;

        tabBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("tab-" + activeTab).classList.remove("active");
        document.getElementById("tab-" + tab).classList.add("active");

        chatFooter.style.display = "none";
        tradeFooter.style.display = "none";
        farmingFooter.style.display = "none";

        if (tab === "chat") chatFooter.style.display = chatMode === "chat" ? "" : "none";
        if (tab === "trade") { renderTradeTab(); if (localStorage.getItem("tradeName")) tradeFooter.style.display = ""; }
        if (tab === "farming") { farmingFooter.style.display = ""; renderFarmingWelcome(); }
        if (tab === "surges") renderSurges();
        if (tab === "world") fetchWorldState();
        if (tab === "modding") renderModdingTab();

        activeTab = tab;
    });
});

// ── 급등 알림 (서버 없으므로 안내 표시) ──
function renderSurges() {
