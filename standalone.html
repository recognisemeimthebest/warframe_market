// ── 거래소 (localStorage) ──
let tradeFilterType = "";

function getTradeListings() {
    return JSON.parse(localStorage.getItem("tradeListings") || "[]");
}

function saveTradeListings(listings) {
    localStorage.setItem("tradeListings", JSON.stringify(listings));
}

function renderTradeTab() {
    const name = localStorage.getItem("tradeName") || "";
    document.getElementById("trade-register").style.display = "none";
    document.getElementById("trade-approved").style.display = "none";

    if (!name) {
        document.getElementById("trade-register").style.display = "";
    } else {
        document.getElementById("trade-approved").style.display = "";
        tradeFooter.style.display = activeTab === "trade" ? "" : "none";
        renderListings();
    }
}

function tradeRegister() {
    const name = document.getElementById("trade-name-input").value.trim();
    if (!name) return;
    localStorage.setItem("tradeName", name);
    renderTradeTab();
}

document.querySelectorAll(".trade-filter").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".trade-filter").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        tradeFilterType = btn.dataset.type;
        renderListings();
    });
});

function renderListings() {
    let items = getTradeListings();
    if (tradeFilterType) items = items.filter(l => l.trade_type === tradeFilterType);

    const el = document.getElementById("trade-list");
    if (!items.length) {
        el.innerHTML = '<div class="surge-empty">매물이 없습니다.</div>';
        return;
    }
    el.innerHTML = "";
    items.forEach(l => {
        const card = document.createElement("div");
        card.className = "trade-card";
        const myName = localStorage.getItem("tradeName") || "";
        const delBtn = l.user_name === myName
            ? `<button class="trade-delete" onclick="deleteListing(${l.id})">삭제</button>` : "";
        card.innerHTML = `
            <div class="trade-card-header">
                <span class="trade-type ${l.trade_type}">${l.trade_type === "buy" ? "삽니다" : "팝니다"}</span>
                <span class="trade-user">${escapeHtml(l.user_name)}</span>
            </div>
            <div class="trade-item">${escapeHtml(l.item_name)}</div>
            <div class="trade-price-row">
                <span class="trade-price">${l.price}p</span>
                <span class="trade-qty">${l.quantity > 1 ? l.quantity + "개" : ""}</span>
                ${delBtn}
            </div>
            ${l.memo ? `<div class="trade-memo">${escapeHtml(l.memo)}</div>` : ""}
        `;
        el.appendChild(card);
    });
}

function deleteListing(id) {
    let listings = getTradeListings();
    listings = listings.filter(l => l.id !== id);
    saveTradeListings(listings);
    renderListings();
}

function toggleTradeForm() {
    const f = document.getElementById("trade-new-form");
    f.style.display = f.style.display === "none" ? "" : "none";
}

function submitListing() {
    const name = localStorage.getItem("tradeName") || "";
    if (!name) return;
    const itemName = document.getElementById("tf-item").value.trim();
    const price = parseInt(document.getElementById("tf-price").value) || 0;
    if (!itemName || price < 1) { alert("아이템과 가격을 입력해주세요."); return; }

    const listings = getTradeListings();
    listings.unshift({
        id: Date.now(),
        user_name: name,
        trade_type: document.getElementById("tf-type").value,
        item_name: itemName,
        price: price,
        quantity: parseInt(document.getElementById("tf-qty").value) || 1,
        memo: document.getElementById("tf-memo").value,
        created_at: new Date().toISOString(),
    });
    saveTradeListings(listings);
    toggleTradeForm();
    renderListings();
}


// ── 월드 상태 (warframestat.us 직접) ──
let worldSection = "fissures";

document.querySelectorAll(".world-filter").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".world-filter").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        worldSection = btn.dataset.section;
        fetchWorldState();
    });
});

async function fetchWorldState() {
    const el = document.getElementById("world-list");
    el.innerHTML = '<div class="surge-empty">로딩 중...</div>';

    try {
        if (worldSection === "fissures") {
            const res = await fetch(`${WS_API}/fissures`);
            const data = await res.json();
            renderFissures(data.filter(f => f.active));
        } else if (worldSection === "arbitration") {
            const res = await fetch(`${WS_API}/arbitration`);
            const data = await res.json();
            renderArbitration(data);
        } else if (worldSection === "invasions") {
            const res = await fetch(`${WS_API}/invasions`);
            const data = await res.json();
            renderInvasions(data.filter(i => !i.completed));
        } else if (worldSection === "cycles") {
            const [cetus, vallis, cambion, zariman] = await Promise.all([
                fetch(`${WS_API}/cetusCycle`).then(r => r.json()).catch(() => null),
                fetch(`${WS_API}/vallisCycle`).then(r => r.json()).catch(() => null),
                fetch(`${WS_API}/cambionCycle`).then(r => r.json()).catch(() => null),
                fetch(`${WS_API}/zarimanCycle`).then(r => r.json()).catch(() => null),
            ]);
            renderCycles({ cetus, vallis, cambion, zariman });
        }
    } catch {
        el.innerHTML = '<div class="surge-empty">데이터를 불러오지 못했습니다.</div>';
    }
}

function renderFissures(items) {
    const el = document.getElementById("world-list");
    if (!items.length) { el.innerHTML = '<div class="surge-empty">활성 균열이 없습니다.</div>'; return; }
    el.innerHTML = "";
    items.forEach(f => {
        const card = document.createElement("div");
        card.className = "world-card";
        const tierCls = (f.tier || "").toLowerCase();
        card.innerHTML = `
            <div class="world-card-header">
                <div class="world-card-title">
                    <span class="world-tag ${tierCls}">${escapeHtml(f.tier)}</span>
                    ${f.isHard ? '<span class="world-tag hard">스틸패스</span>' : ""}
                    ${escapeHtml(f.node)}
                </div>
                <div class="world-card-timer">${escapeHtml(f.eta || "")}</div>
            </div>
            <div class="world-card-detail">
                <span class="world-tag enemy">${escapeHtml(f.enemy || "")}</span>
                ${escapeHtml(f.missionType || "")}
            </div>
        `;
        el.appendChild(card);
    });
}

function renderArbitration(arb) {
    const el = document.getElementById("world-list");
    if (!arb || arb.error) { el.innerHTML = '<div class="surge-empty">현재 중재 정보가 없습니다.</div>'; return; }
    el.innerHTML = `
        <div class="world-card">
            <div class="world-card-header">
                <div class="world-card-title">${escapeHtml(arb.node || "")}</div>
                <div class="world-card-timer">${escapeHtml(arb.eta || "")}</div>
            </div>
            <div class="world-card-detail">
                <span class="world-tag enemy">${escapeHtml(arb.enemy || "")}</span>
                ${escapeHtml(arb.type || "")}
            </div>
        </div>
    `;
}

function renderInvasions(items) {
    const el = document.getElementById("world-list");
    if (!items.length) { el.innerHTML = '<div class="surge-empty">활성 침공이 없습니다.</div>'; return; }
    el.innerHTML = "";
    items.forEach(inv => {
        const card = document.createElement("div");
        card.className = "world-card";
        const atkReward = (inv.attackerReward?.countedItems || []).map(i => escapeHtml(i.type)).join(", ") || "크레딧";
        const defReward = (inv.defenderReward?.countedItems || []).map(i => escapeHtml(i.type)).join(", ") || "크레딧";
        const pct = ((inv.completion || 0)).toFixed(1);
        const fillCls = (inv.attackingFaction || "").toLowerCase();
        card.innerHTML = `
            <div class="world-card-header">
                <div class="world-card-title">${escapeHtml(inv.node || "")}</div>
                <div class="world-card-timer">${pct}%</div>
            </div>
            <div class="world-card-detail">${escapeHtml(inv.desc || "")}</div>
            <div class="invasion-rewards">
                <span class="atk">${escapeHtml(inv.attackingFaction || "")}: ${atkReward}</span>
                <span class="def">${escapeHtml(inv.defendingFaction || "")}: ${defReward}</span>
            </div>
            <div class="invasion-bar"><div class="invasion-bar-fill ${fillCls}" style="width:${Math.max(0, Math.min(100, inv.completion || 0))}%"></div></div>
        `;
        el.appendChild(card);
    });
}

function renderCycles(data) {
    const el = document.getElementById("world-list");
    el.innerHTML = "";
    const stateMap = { day: "낮", night: "밤", warm: "따뜻함", cold: "추위", fass: "파스", vome: "봄", corpus: "코퍼스", grineer: "그리니어" };
    const stateClass = { day: "day", night: "night", warm: "warm", cold: "cold", fass: "warm", vome: "cold", corpus: "cold", grineer: "warm" };
    const regionNames = { cetus: "세투스", vallis: "오브 밸리스", cambion: "캠비온 퇴적지", zariman: "자리만" };

    for (const [region, info] of Object.entries(data)) {
        if (!info) continue;
        const row = document.createElement("div");
        row.className = "cycle-row";
        const state = info.state || "";
        row.innerHTML = `
            <div class="cycle-name">${regionNames[region] || region}</div>
            <span class="cycle-state ${stateClass[state] || ""}">${stateMap[state] || state}</span>
            <span class="cycle-timer">${escapeHtml(info.timeLeft || info.shortString || "")}</span>
        `;
        el.appendChild(row);
    }
    if (!el.children.length) {
        el.innerHTML = '<div class="surge-empty">사이클 정보를 불러올 수 없습니다.</div>';
    }
}


// ── 파밍 정보 (drops.warframestat.us 직접) ──
let dropTableCache = null;

async function loadDropTable() {
    if (dropTableCache) return dropTableCache;
    try {
        const res = await fetch(DROPS_API);
        dropTableCache = await res.json();
        return dropTableCache;
    } catch {
        return null;
    }
}

function renderFarmingWelcome() {
    document.getElementById("farming-results").innerHTML = `
        <div class="farming-welcome">
            아이템이나 모드 이름을 검색하면<br>파밍 위치와 드롭 확률을 알려드려요!<br>
            <small>(첫 검색 시 드롭 테이블 로딩에 수 초 소요)</small>
        </div>
    `;
}

document.getElementById("farming-form").addEventListener("submit", async () => {
    const q = document.getElementById("farming-input").value.trim();
    if (!q) return;
    const resultsEl = document.getElementById("farming-results");
    resultsEl.innerHTML = '<div class="surge-empty">검색 중... (첫 검색 시 드롭 테이블 다운로드)</div>';

    const table = await loadDropTable();
    if (!table) {
        resultsEl.innerHTML = '<div class="surge-empty">드롭 테이블을 불러오지 못했습니다.</div>';
        return;
    }

    // 검색
    const ql = q.toLowerCase();
    const results = [];

    for (const place of table) {
        if (!place.rewards) continue;
        for (const reward of place.rewards) {
            if (reward.itemName && reward.itemName.toLowerCase().includes(ql)) {
                results.push({
                    source: place.place || "Unknown",
                    item: reward.itemName,
                    rarity: reward.rarity || "",
                    chance: reward.chance != null ? reward.chance.toFixed(2) + "%" : "",
                });
            }
        }
    }

    if (!results.length) {
        resultsEl.innerHTML = `<div class="surge-empty">"${escapeHtml(q)}"에 대한 파밍 정보를 찾지 못했습니다.</div>`;
        return;
    }

    // 그룹화: 아이템별
    const byItem = {};
    for (const r of results) {
        if (!byItem[r.item]) byItem[r.item] = [];
        byItem[r.item].push(r);
    }

    resultsEl.innerHTML = "";
    const itemNames = Object.keys(byItem).slice(0, 5);
    for (const itemName of itemNames) {
        const drops = byItem[itemName].slice(0, 15);
        const card = document.createElement("div");
        card.className = "farming-card";
        let dropsHtml = drops.map(d => `
            <div class="farming-drop">
                <div class="farming-drop-source">
                    ${escapeHtml(d.source)}
                    ${d.rarity ? `<span class="farming-relic-rarity ${d.rarity.toLowerCase()}">${escapeHtml(d.rarity)}</span>` : ""}
                </div>
                <div class="farming-drop-rate">${escapeHtml(d.chance)}</div>
            </div>
        `).join("");
        card.innerHTML = `
            <div class="farming-card-title">${escapeHtml(itemName)}</div>
            <div class="farming-card-sub">${drops.length}개 드롭 소스${byItem[itemName].length > 15 ? ` (총 ${byItem[itemName].length}건 중 15건 표시)` : ""}</div>
            ${dropsHtml}
        `;
        resultsEl.appendChild(card);
    }
    if (Object.keys(byItem).length > 5) {
        resultsEl.innerHTML += `<div class="surge-empty">외 ${Object.keys(byItem).length - 5}개 아이템 검색됨. 더 구체적으로 검색해보세요.</div>`;
    }
});


// ── 워치리스트 (localStorage) ──
function getWatchlist() {
    return JSON.parse(localStorage.getItem("watchlist") || "[]");
}

function saveWatchlist(list) {
    localStorage.setItem("watchlist", JSON.stringify(list));
}

function renderWatchlist() {
    const el = document.getElementById("chat-watchlist");
    const items = getWatchlist();
    el.innerHTML = "";

    // 추가 폼
    const addForm = document.createElement("div");
    addForm.className = "watchlist-add-form";
    addForm.innerHTML = `
        <div class="form-row"><label>아이템</label><input type="text" id="wl-item" placeholder="아이템 이름 (영문)..." autocomplete="off"></div>
        <div class="form-row"><label>목표가</label><input type="number" id="wl-price" placeholder="이 가격 이하면 알림" min="1"><span style="color:var(--text-muted);font-size:13px;margin-left:4px;">p</span></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button class="btn-submit" onclick="addWatchItem()" style="padding:6px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--orange);color:#000;">추가</button>
        </div>
    `;
    el.appendChild(addForm);

    if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "watchlist-empty";
        empty.textContent = "감시 중인 아이템이 없습니다.";
        el.appendChild(empty);
        return;
    }

    items.forEach((w, idx) => {
        const card = document.createElement("div");
        card.className = "watchlist-card";
        const isHit = w.status === "triggered";
        card.innerHTML = `
            <div class="watchlist-info">
                <div class="watchlist-item">${escapeHtml(w.item_name)}</div>
                <div class="watchlist-price-row">
                    <span class="watchlist-target">목표 ${w.target_price}p</span>
                    <span class="watchlist-market">현재 ${w.current_price != null ? w.current_price + "p" : "-"}</span>
                </div>
            </div>
            <div class="watchlist-actions">
                <span class="watchlist-status ${isHit ? "hit" : "waiting"}">${isHit ? "도달!" : "대기"}</span>
                <button class="watchlist-delete" onclick="removeWatchItem(${idx})">삭제</button>
            </div>
        `;
        el.appendChild(card);
    });
}

async function addWatchItem() {
    const itemInput = document.getElementById("wl-item").value.trim();
    const price = parseInt(document.getElementById("wl-price").value) || 0;
    if (!itemInput) { alert("아이템을 입력해주세요."); return; }
    if (price < 1) { alert("목표가를 입력해주세요."); return; }

    const items = await loadWmItems();
    const q = itemInput.toLowerCase();
    const match = items.find(i => i.url_name === q.replace(/ /g, "_") || i.item_name.toLowerCase() === q);
    if (!match) { alert("아이템을 찾을 수 없습니다. 영문으로 정확히 입력해주세요."); return; }

    const list = getWatchlist();
    list.unshift({
        item_name: match.item_name,
        item_slug: match.url_name,
        target_price: price,
        current_price: null,
        status: "watching",
    });
    saveWatchlist(list);
    renderWatchlist();
}

function removeWatchItem(idx) {
    const list = getWatchlist();
    list.splice(idx, 1);
    saveWatchlist(list);
    renderWatchlist();
}


// ── 경매 (warframe.market auction 직접) ──
let auctionType = "riven";
let auctionQuery = "";

const ELEMENT_KO = {
    impact: "충격", heat: "화염", cold: "냉기", electricity: "전기",
    toxin: "독소", blast: "폭발", radiation: "방사능", viral: "바이러스",
    corrosive: "부식", gas: "가스", magnetic: "자기",
};

function renderAuctionView() {
    const container = document.getElementById("chat-auction");
    container.innerHTML = "";

    const search = document.createElement("div");
    search.className = "auction-search";
    search.innerHTML = `
        <input type="text" id="auction-search-input" placeholder="무기 이름 (영문, 예: kuva_bramma)..." value="${escapeHtml(auctionQuery)}">
        <button onclick="doAuctionSearch()">검색</button>
    `;
    container.appendChild(search);

    // Enter 키 지원
    setTimeout(() => {
        const inp = document.getElementById("auction-search-input");
        if (inp) inp.addEventListener("keydown", e => { if (e.key === "Enter") doAuctionSearch(); });
    }, 0);

    const tabs = document.createElement("div");
    tabs.className = "auction-tabs";
    [{ key: "riven", label: "리벤 모드" }, { key: "lich", label: "리치/시스터" }].forEach(t => {
        const btn = document.createElement("button");
        btn.className = "auction-tab" + (auctionType === t.key ? " active" : "");
        btn.textContent = t.label;
        btn.onclick = () => { auctionType = t.key; renderAuctionView(); };
        tabs.appendChild(btn);
    });
    container.appendChild(tabs);

    if (!auctionQuery) {
        container.innerHTML += '<div class="auction-empty">무기 이름을 검색해보세요.<br><small>예: kuva_bramma, rubico_prime</small></div>';
        return;
    }

    if (auctionType === "riven") fetchRivenAuctions(container);
    else fetchLichAuctions(container);
}

function doAuctionSearch() {
    auctionQuery = (document.getElementById("auction-search-input")?.value || "").trim();
    renderAuctionView();
}

async function fetchRivenAuctions(container) {
    const weapon = auctionQuery.toLowerCase().replace(/ /g, "_");
    container.innerHTML += '<div class="auction-empty">검색 중...</div>';

    try {
        const res = await fetch(`${WM_API}/auctions/search?type=riven&weapon_url_name=${weapon}&buyout_policy=with&sort_by=price_asc`);
        const json = await res.json();
        const auctions = json.payload?.auctions || [];

        // 마지막 "검색 중..." 제거
        const loading = container.querySelector(".auction-empty");
        if (loading) loading.remove();

        if (!auctions.length) {
            container.innerHTML += '<div class="auction-empty">검색 결과가 없습니다.</div>';
            return;
        }

        auctions.slice(0, 30).forEach(a => {
            const card = document.createElement("div");
            card.className = "auction-card";
            const item = a.item;
            const name = item.name || weapon;
            const priceText = a.top_bid ? a.top_bid + "p" : (a.starting_price + "p 시작");
            const buyoutText = a.buyout_price ? `<span class="buyout">즉시 구매 ${a.buyout_price}p</span>` : "";

            const stats = (item.attributes || []).map(s => {
                const positive = s.positive;
                return `<span class="auction-stat ${positive ? "positive" : "negative"}">${escapeHtml(s.url_name.replace(/_/g, " "))} ${s.value > 0 ? "+" : ""}${s.value.toFixed(1)}%</span>`;
            }).join("");

            card.innerHTML = `
                <div class="auction-card-header">
                    <div class="auction-card-title"><a href="https://warframe.market/auction/${a.id}" target="_blank">${escapeHtml(name)}</a></div>
                    <div class="auction-card-price">${priceText} ${buyoutText}</div>
                </div>
                <div class="auction-stats">${stats}</div>
                <div class="auction-stats" style="margin-top:4px;">
                    <span class="auction-stat">MR ${item.mastery_level || 0}</span>
                    <span class="auction-stat">리롤 ${item.re_rolls || 0}회</span>
                </div>
                <div class="auction-seller">
                    ${escapeHtml(a.owner?.ingame_name || "")} ·
                    <span class="${a.owner?.status !== "offline" ? "online" : ""}">
                        ${a.owner?.status === "ingame" ? "인게임" : a.owner?.status === "online" ? "온라인" : "오프라인"}
                    </span>
                </div>
            `;
            container.appendChild(card);
        });
    } catch (e) {
        container.innerHTML += `<div class="auction-empty">경매 데이터를 불러오지 못했습니다.<br><small>${escapeHtml(e.message)}</small></div>`;
    }
}

async function fetchLichAuctions(container) {
    const weapon = auctionQuery.toLowerCase().replace(/ /g, "_");
    container.innerHTML += '<div class="auction-empty">검색 중...</div>';

    try {
        const res = await fetch(`${WM_API}/auctions/search?type=lich&weapon_url_name=${weapon}&buyout_policy=with&sort_by=price_asc`);
        const json = await res.json();
        const auctions = json.payload?.auctions || [];

        const loading = container.querySelector(".auction-empty");
        if (loading) loading.remove();

        if (!auctions.length) {
            container.innerHTML += '<div class="auction-empty">검색 결과가 없습니다.</div>';
            return;
        }

        auctions.slice(0, 30).forEach(a => {
            const card = document.createElement("div");
            card.className = "auction-card";
            const item = a.item;
            const priceText = a.top_bid ? a.top_bid + "p" : "-";
            const buyoutText = a.buyout_price ? `<span class="buyout">즉시 구매 ${a.buyout_price}p</span>` : '<span class="buyout">즉구 없음</span>';
            const sourceLabel = item.type === "lich" ? "리치" : "시스터";
            const elementKo = ELEMENT_KO[item.element] || item.element || "";
            const ephTag = item.having_ephemera ? `<span class="auction-ephemera-tag">에페메라</span>` : "";

            card.innerHTML = `
                <div class="auction-card-header">
                    <div class="auction-card-title"><a href="https://warframe.market/auction/${a.id}" target="_blank">${escapeHtml(item.weapon_url_name || weapon)}</a> ${ephTag}</div>
                    <div class="auction-card-price">${priceText} ${buyoutText}</div>
                </div>
                <div class="auction-stats">
                    <span class="auction-stat">${sourceLabel}</span>
                    <span class="auction-stat positive">${escapeHtml(elementKo)} ${item.damage || 0}%</span>
                </div>
                <div class="auction-seller">
                    ${escapeHtml(a.owner?.ingame_name || "")} ·
                    <span class="${a.owner?.status !== "offline" ? "online" : ""}">
                        ${a.owner?.status === "ingame" ? "인게임" : a.owner?.status === "online" ? "온라인" : "오프라인"}
                    </span>
                </div>
            `;
            container.appendChild(card);
        });
    } catch (e) {
        container.innerHTML += `<div class="auction-empty">경매 데이터를 불러오지 못했습니다.<br><small>${escapeHtml(e.message)}</small></div>`;
    }
}


// ── 모딩 공유 (localStorage) ──
const MODDING_CATEGORIES = [
    { key: "warframe", label: "워프레임" },
    { key: "primary", label: "주무기" },
    { key: "secondary", label: "보조무기" },
    { key: "melee", label: "근접무기" },
    { key: "archwing", label: "아크윙" },
    { key: "necramech", label: "네크라메크" },
    { key: "archgun", label: "아크윙무기" },
    { key: "companion", label: "동반자" },
];

let moddingCategory = "warframe";
let moddingSelectedItem = "";
let moddingFormOpen = false;
let moddingFormImages = []; // data URLs

function getModdingShares() {
    return JSON.parse(localStorage.getItem("moddingShares") || "[]");
}

function saveModdingShares(shares) {
    localStorage.setItem("moddingShares", JSON.stringify(shares));
}

function renderModdingTab() {
    const container = document.getElementById("modding-content");
    container.innerHTML = "";

    const cats = document.createElement("div");
    cats.className = "modding-cats";
    MODDING_CATEGORIES.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "modding-cat-btn" + (moddingCategory === cat.key ? " active" : "");
        btn.textContent = cat.label;
        btn.onclick = () => { moddingCategory = cat.key; moddingSelectedItem = ""; moddingFormOpen = false; moddingFormImages = []; renderModdingTab(); };
        cats.appendChild(btn);
    });
    container.appendChild(cats);

    if (moddingSelectedItem) {
        renderModdingDetail(container);
    } else {
        renderModdingItemList(container);
    }
}

function renderModdingItemList(container) {
    const addRow = document.createElement("div");
    addRow.style.cssText = "display:flex;justify-content:flex-end;margin-bottom:10px;";
    const addBtn = document.createElement("button");
    addBtn.className = "modding-add-btn";
    addBtn.innerHTML = "+ 공유하기";
    addBtn.onclick = () => { moddingFormOpen = !moddingFormOpen; renderModdingTab(); };
    addRow.appendChild(addBtn);
    container.appendChild(addRow);

    if (moddingFormOpen) {
        container.appendChild(buildModdingForm());
    }

    const shares = getModdingShares().filter(s => s.category === moddingCategory);

    // 아이템별 그룹화
    const byItem = {};
    for (const s of shares) {
        if (!byItem[s.item_name]) byItem[s.item_name] = [];
        byItem[s.item_name].push(s);
    }

    const itemNames = Object.keys(byItem);
    if (!itemNames.length) {
        container.innerHTML += '<div class="modding-empty">아직 공유된 모딩이 없습니다. 첫 번째로 공유해보세요!</div>';
        return;
    }

    // 최신순 정렬
    itemNames.sort((a, b) => {
        const latestA = Math.max(...byItem[a].map(s => new Date(s.created_at).getTime()));
        const latestB = Math.max(...byItem[b].map(s => new Date(s.created_at).getTime()));
        return latestB - latestA;
    });

    itemNames.forEach(name => {
        const items = byItem[name];
        const latest = new Date(Math.max(...items.map(s => new Date(s.created_at).getTime())));
        const dateStr = latest.toLocaleDateString("ko-KR", { month: "short", day: "numeric" });
        const card = document.createElement("div");
        card.className = "modding-item-card";
        card.innerHTML = `
            <div class="modding-item-thumb-empty"></div>
            <div class="modding-item-info">
                <div class="modding-item-name">${escapeHtml(name)}</div>
                <div class="modding-item-meta">${items.length}건의 공유 · ${dateStr} 최신</div>
            </div>
            <div class="modding-item-arrow">›</div>
        `;
        card.onclick = () => { moddingSelectedItem = name; moddingFormOpen = false; renderModdingTab(); };
        container.appendChild(card);
    });
}

function renderModdingDetail(container) {
    const header = document.createElement("div");
    header.className = "modding-detail-header";
    header.innerHTML = `
        <button class="modding-back-btn" onclick="moddingSelectedItem='';renderModdingTab();">← 목록</button>
        <span class="modding-detail-title">${escapeHtml(moddingSelectedItem)}</span>
    `;
    container.appendChild(header);

    const addRow = document.createElement("div");
    addRow.style.cssText = "display:flex;justify-content:flex-end;margin-bottom:10px;";
    const addBtn = document.createElement("button");
    addBtn.className = "modding-add-btn";
    addBtn.innerHTML = "+ 공유하기";
    addBtn.onclick = () => { moddingFormOpen = !moddingFormOpen; renderModdingTab(); };
    addRow.appendChild(addBtn);
    container.appendChild(addRow);

    if (moddingFormOpen) {
        container.appendChild(buildModdingForm(moddingSelectedItem));
    }

    const shares = getModdingShares().filter(s => s.category === moddingCategory && s.item_name === moddingSelectedItem);
    if (!shares.length) {
        container.innerHTML += '<div class="modding-empty">이 아이템에 대한 공유가 없습니다.</div>';
        return;
    }

    const myName = localStorage.getItem("tradeName") || "";

    shares.forEach(s => {
        const card = document.createElement("div");
        card.className = "modding-card";
        const dateStr = new Date(s.created_at).toLocaleDateString("ko-KR", { year: "numeric", month: "short", day: "numeric" });
        let imagesHtml = "";
        if (s.images && s.images.length) {
            imagesHtml = '<div class="modding-images">' +
                s.images.map(src => `<img src="${src}" alt="모딩 이미지" onclick="openModdingLightbox(this.src)">`).join("") +
                '</div>';
        }
        const delBtn = s.author === myName ? `<button class="modding-card-delete" onclick="deleteModdingShare(${s.id});event.stopPropagation();">삭제</button>` : "";
        card.innerHTML = `
            <div class="modding-card-top">
                <span class="modding-card-author">${escapeHtml(s.author)}</span>
                <span class="modding-card-date">${dateStr}</span>
                ${delBtn}
            </div>
            ${s.memo ? `<div class="modding-card-memo">${escapeHtml(s.memo)}</div>` : ""}
            ${imagesHtml}
        `;
        container.appendChild(card);
    });
}

function deleteModdingShare(id) {
    let shares = getModdingShares();
    shares = shares.filter(s => s.id !== id);
    saveModdingShares(shares);
    renderModdingTab();
}

function buildModdingForm(prefillName) {
    const form = document.createElement("div");
    form.className = "modding-form";
    const catLabel = MODDING_CATEGORIES.find(c => c.key === moddingCategory)?.label || "";
    const nameVal = prefillName ? escapeHtml(prefillName) : "";
    const nameRo = prefillName ? " readonly" : "";

    form.innerHTML = `
        <div class="form-row"><label>${escapeHtml(catLabel)} 이름</label><input type="text" id="modding-f-name" placeholder="예: Mesa Prime" maxlength="50" value="${nameVal}"${nameRo}></div>
        <div class="form-row">
            <label>메모 (최대 1000자)</label>
            <textarea id="modding-f-memo" maxlength="1000" placeholder="모딩에 대한 설명이나 운영법을 적어주세요..."></textarea>
            <div style="text-align:right;font-size:11px;color:var(--text-muted);margin-top:2px;" id="modding-memo-count">0 / 1000</div>
        </div>
        <div class="form-row">
            <label>이미지 (최대 5장)</label>
            <div class="modding-upload-area" id="modding-upload-area">클릭하거나 이미지를 드래그하여 업로드</div>
            <input type="file" id="modding-file-input" accept="image/*" multiple style="display:none;">
            <div class="modding-upload-preview" id="modding-upload-preview"></div>
        </div>
        <div class="form-row"><label>작성자</label><input type="text" id="modding-f-author" placeholder="닉네임" maxlength="20" value="${escapeHtml(localStorage.getItem("tradeName") || "")}"></div>
        <div class="modding-form-actions">
            <button class="btn-cancel" onclick="moddingFormOpen=false;moddingFormImages=[];renderModdingTab();">취소</button>
            <button class="btn-submit" onclick="submitModdingShare()">공유하기</button>
        </div>
    `;

    setTimeout(() => {
        const area = document.getElementById("modding-upload-area");
        const fileInput = document.getElementById("modding-file-input");
        const memo = document.getElementById("modding-f-memo");

        if (memo) memo.addEventListener("input", () => {
            document.getElementById("modding-memo-count").textContent = memo.value.length + " / 1000";
        });
        if (area && fileInput) {
            area.addEventListener("click", () => fileInput.click());
            area.addEventListener("dragover", e => { e.preventDefault(); area.style.borderColor = "var(--primary)"; });
            area.addEventListener("dragleave", () => { area.style.borderColor = "var(--border)"; });
            area.addEventListener("drop", e => { e.preventDefault(); area.style.borderColor = "var(--border)"; handleModdingFiles(e.dataTransfer.files); });
            fileInput.addEventListener("change", () => { handleModdingFiles(fileInput.files); fileInput.value = ""; });
        }
        renderModdingUploadPreview();
    }, 0);

    return form;
}

function handleModdingFiles(files) {
    const remaining = 5 - moddingFormImages.length;
    if (remaining <= 0) return;

    for (const file of Array.from(files).slice(0, remaining)) {
        if (!file.type.startsWith("image/")) continue;
        const reader = new FileReader();
        reader.onload = () => {
            moddingFormImages.push(reader.result);
            renderModdingUploadPreview();
        };
        reader.readAsDataURL(file);
    }
}

function renderModdingUploadPreview() {
    const preview = document.getElementById("modding-upload-preview");
    if (!preview) return;
    preview.innerHTML = "";
    moddingFormImages.forEach((dataUrl, idx) => {
        const thumb = document.createElement("div");
        thumb.className = "thumb";
        thumb.innerHTML = `<img src="${dataUrl}"><button class="thumb-remove" onclick="removeModdingImage(${idx})">×</button>`;
        preview.appendChild(thumb);
    });
    const area = document.getElementById("modding-upload-area");
    if (area) area.style.display = moddingFormImages.length >= 5 ? "none" : "";
}

function removeModdingImage(idx) {
    moddingFormImages.splice(idx, 1);
    renderModdingUploadPreview();
}

function submitModdingShare() {
    const name = (document.getElementById("modding-f-name")?.value || "").trim();
    const memo = (document.getElementById("modding-f-memo")?.value || "").trim();
    const author = (document.getElementById("modding-f-author")?.value || "").trim();

    if (!name) { alert("이름을 입력해주세요."); return; }
    if (!author) { alert("작성자 이름을 입력해주세요."); return; }

    const shares = getModdingShares();
    shares.unshift({
        id: Date.now(),
        category: moddingCategory,
        item_name: name,
        author: author,
        memo: memo,
        images: [...moddingFormImages],
        created_at: new Date().toISOString(),
    });
    saveModdingShares(shares);

    moddingFormOpen = false;
    moddingFormImages = [];
    moddingSelectedItem = name;
    renderModdingTab();
}

function openModdingLightbox(src) {
    const lb = document.createElement("div");
    lb.className = "modding-lightbox";
    lb.innerHTML = `<img src="${src}">`;
    lb.onclick = () => lb.remove();
    document.body.appendChild(lb);
}


// ── 알림 팝업 ──
function showAlertNotify(text) {
    if (JSON.parse(localStorage.getItem("settingDnd") || "false")) return;
    const el = document.getElementById("alert-notify");
    if (!el) return;
    el.textContent = text;
    el.style.display = "block";
    setTimeout(() => { el.style.display = "none"; }, 5000);
}


// ── 설정 ──
function toggleSettings() {
    const overlay = document.getElementById("settings-overlay");
    const panel = document.getElementById("settings-panel");
    const show = overlay.style.display === "none";
    overlay.style.display = show ? "" : "none";
    panel.style.display = show ? "" : "none";
    if (show) { loadSettings(); renderPaletteGrid(); }
}

function saveSettings() {
    localStorage.setItem("settingDnd", JSON.stringify(document.getElementById("set-dnd").checked));
}

function loadSettings() {
    document.getElementById("set-dnd").checked = JSON.parse(localStorage.getItem("settingDnd") || "false");
}

// ── 테마 ──
const PALETTES = {
    dark: [
        { name: "기본", colors: ["#1a1a2e", "#16213e", "#4db8ff", "#e0e0e0"], vars: { "--bg": "#1a1a2e", "--surface": "#16213e", "--primary": "#4db8ff", "--text": "#e0e0e0", "--text-muted": "#888", "--border": "#2a2a4a", "--user-bubble": "#0f3460", "--price-bg": "#0a1628" } },
        { name: "보라", colors: ["#1a1025", "#2d1b4e", "#b388ff", "#e0e0e0"], vars: { "--bg": "#1a1025", "--surface": "#2d1b4e", "--primary": "#b388ff", "--text": "#e0e0e0", "--text-muted": "#999", "--border": "#3d2a5c", "--user-bubble": "#3a1f6e", "--price-bg": "#120b1c" } },
        { name: "초록", colors: ["#0d1f0d", "#1a3a1a", "#66bb6a", "#d0e8d0"], vars: { "--bg": "#0d1f0d", "--surface": "#1a3a1a", "--primary": "#66bb6a", "--text": "#d0e8d0", "--text-muted": "#7a9c7a", "--border": "#2a4a2a", "--user-bubble": "#1a4a1a", "--price-bg": "#081408" } },
    ],
    light: [
        { name: "기본", colors: ["#f5f5f5", "#ffffff", "#1976d2", "#212121"], vars: { "--bg": "#f5f5f5", "--surface": "#ffffff", "--primary": "#1976d2", "--text": "#212121", "--text-muted": "#757575", "--border": "#e0e0e0", "--user-bubble": "#bbdefb", "--price-bg": "#e3f2fd" } },
        { name: "따뜻한", colors: ["#fff8e1", "#ffffff", "#f57c00", "#3e2723"], vars: { "--bg": "#fff8e1", "--surface": "#ffffff", "--primary": "#f57c00", "--text": "#3e2723", "--text-muted": "#8d6e63", "--border": "#ffe0b2", "--user-bubble": "#ffe0b2", "--price-bg": "#fff3e0" } },
    ],
};

let currentMode = localStorage.getItem("themeMode") || "dark";
let currentPalette = parseInt(localStorage.getItem("themePalette_" + currentMode) || "0");

function applyPalette() {
    const palettes = PALETTES[currentMode];
    const p = palettes[currentPalette] || palettes[0];
    for (const [key, val] of Object.entries(p.vars)) {
        document.documentElement.style.setProperty(key, val);
    }
}

function switchMode(mode) {
    currentMode = mode;
    localStorage.setItem("themeMode", mode);
    currentPalette = parseInt(localStorage.getItem("themePalette_" + mode) || "0");
    applyPalette();
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
    document.getElementById("palette-label").textContent = (mode === "dark" ? "다크" : "라이트") + " 팔레트";
    renderPaletteGrid();
}

function renderPaletteGrid() {
    const grid = document.getElementById("palette-grid");
    if (!grid) return;
    grid.innerHTML = "";
    const palettes = PALETTES[currentMode];
    palettes.forEach((p, idx) => {
        const opt = document.createElement("div");
        opt.className = "palette-option" + (idx === currentPalette ? " active" : "");
        opt.addEventListener("click", () => {
            currentPalette = idx;
            localStorage.setItem("themePalette_" + currentMode, idx);
            applyPalette();
            renderPaletteGrid();
        });
        const colors = document.createElement("div");
        colors.className = "palette-colors";
        p.colors.forEach(c => {
            const swatch = document.createElement("div");
            swatch.className = "palette-swatch";
            swatch.style.background = c;
            colors.appendChild(swatch);
        });
        const name = document.createElement("span");
        name.className = "palette-name";
        name.textContent = p.name;
        opt.appendChild(colors);
        opt.appendChild(name);
        grid.appendChild(opt);
    });
}

// ── 초기화 ──
applyPalette();
// 백그라운드로 아이템 목록 미리 로드
loadWmItems();
</script>
